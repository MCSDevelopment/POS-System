{% extends 'base.html' %}
{% block content %}
<style>
    .order-page {
        display: flex;
        height: 90vh;
        padding: 20px;
        margin: 0px 15px;
    }

    .menu-section {
        flex: 0 0 80%;
        padding-right: 20px;
        border-right: 2px solid #ccc;
    }

    .order-summary {
        flex: 0 0 20%;
        padding-left: 20px;
    }

    .menu-item {
        margin-bottom: 20px; /* Increased spacing between items */
    }

    .menu-item button {
        width: 150px; /* Larger button size */
        height: 150px;
        padding: 10px;
        border: 2px solid #ccc;
        border-radius: 10px;
        background-color: #f9f9f9;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        transition: transform 0.2s;
        position: relative;
        overflow: hidden;
    }

    .menu-item button:hover {
        transform: scale(1.05); /* Slight zoom on hover */
    }

    .menu-item img {
        width: 100%;
        height: 70%; /* Image takes most of the button height */
        object-fit: cover; /* Ensure image fits nicely */
        position: absolute;
        bottom: 0;
    }

    .menu-item .item-name {
        font-size: 16px;
        font-weight: bold;
        color: #fff; /* White text for contrast */
        background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background for readability */
        padding: 5px;
        width: 100%;
        text-align: center;
        position: absolute;
        top: 0;
        z-index: 1; /* Ensure name is above image */
    }

    .order-total {
        font-weight: bold;
        margin-top: 20px;
        font-size: 18px;
    }
</style>

<div class="order-page">
    <!-- Left side: Menu -->
    <div class="menu-section">
        <h2>Menu</h2>
        <div class="menu-item">
            <button onclick="addToOrder('Burger', 8)">
                <span class="item-name">Burger - $8</span>
                <img src="{{ url_for('static', filename='images/burger.jpg') }}" alt="Burger">
            </button>
        </div>
        <div class="menu-item">
            <button onclick="addToOrder('Fries', 3)">
                <span class="item-name">Fries - $3</span>
                <img src="{{ url_for('static', filename='images/fries.jpg') }}" alt="Fries">
            </button>
        </div>
        <div class="menu-item">
            <button onclick="addToOrder('Soda', 2)">
                <span class="item-name">Soda - $2</span>
                <img src="{{ url_for('static', filename='images/soda.jpg') }}" alt="Soda">
            </button>
        </div>
        <div class="menu-item">
            <button onclick="addToOrder('Salad', 6)">
                <span class="item-name">Salad - $6</span>
                <img src="{{ url_for('static', filename='images/salad.jpg') }}" alt="Salad">
            </button>
        </div>
        <!-- Add more items as needed -->
    </div>

    <!-- Right side: Order summary -->
    <div class="order-summary">
        <h2>Current Order</h2>
        <ul id="order-list"></ul>
        <div class="order-total">
            Total: $<span id="total">0</span>
        </div>
    </div>
</div>

<script>
    let total = 0;

    function addToOrder(item, price) {
        const orderList = document.getElementById('order-list');
        const listItem = document.createElement('li');
        listItem.textContent = `${item} - $${price}`;
        orderList.appendChild(listItem);

        total += price;
        document.getElementById('total').textContent = total.toFixed(2);
    }
</script>
{% endblock %}
